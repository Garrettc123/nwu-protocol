name: Failover Deployment System

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      max_retries:
        description: 'Max retry attempts'
        default: '5'
        type: string

env:
  MAX_RETRY_ATTEMPTS: ${{ github.event.inputs.max_retries || '5' }}
  RETRY_DELAY_SECONDS: 30

jobs:
  deploy-with-failover:
    name: Deploy with Auto-Retry
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: ${{ hashFiles('package-lock.json') != '' && 'npm' || '' }}

      - name: Install with Retry
        run: |
          attempt=1
          while [ $attempt -le ${{ env.MAX_RETRY_ATTEMPTS }} ]; do
            echo "Attempt $attempt/${{ env.MAX_RETRY_ATTEMPTS }}"
            if npm ci || npm install; then
              echo "Dependencies installed!"
              exit 0
            fi
            echo "Retrying in ${{ env.RETRY_DELAY_SECONDS }}s..."
            sleep ${{ env.RETRY_DELAY_SECONDS }}
            attempt=$((attempt + 1))
          done

      - name: Build with Retry
        run: |
          attempt=1
          while [ $attempt -le ${{ env.MAX_RETRY_ATTEMPTS }} ]; do
            echo "Build attempt $attempt/${{ env.MAX_RETRY_ATTEMPTS }}"
            if npm run build || npm run compile; then
              echo "Build successful!"
              exit 0
            fi
            sleep ${{ env.RETRY_DELAY_SECONDS }}
            attempt=$((attempt + 1))
          done

      - name: Deploy with Retry
        run: |
          attempt=1
          while [ $attempt -le ${{ env.MAX_RETRY_ATTEMPTS }} ]; do
            echo "Deploy attempt $attempt/${{ env.MAX_RETRY_ATTEMPTS }}"
            if npm run deploy || echo "No deploy script"; then
              echo "Deployment successful!"
              exit 0
            fi
            sleep ${{ env.RETRY_DELAY_SECONDS }}
            attempt=$((attempt + 1))
          done

      - name: Complete
        run: |
          echo "FAILOVER DEPLOYMENT OPERATIONAL!"
