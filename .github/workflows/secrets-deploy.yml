name: Deploy with SSM Secrets

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC → AWS

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region:     ${{ vars.AWS_REGION }}

      - name: Pull secrets from SSM → environment
        env:
          SECRETOPS_PREFIX:  ${{ vars.SECRETOPS_PREFIX }}
          SECRETOPS_ENV:     ${{ vars.SECRETOPS_ENV }}
          SECRETOPS_SERVICE: nwu-protocol
        run: |
          pip install --quiet boto3 botocore
          python scripts/secretops.py \
            --prefix "$SECRETOPS_PREFIX" \
            --env    "$SECRETOPS_ENV" \
            --service nwu-protocol \
            export-github-env \
            --required STRIPE_API_KEY STRIPE_WEBHOOK_SECRET DATABASE_URL JWT_SECRET_KEY

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run database migrations
        env:
          DATABASE_URL:    ${{ env.DATABASE_URL }}
        run: |
          if [ -f "backend/alembic.ini" ]; then
            cd backend && alembic upgrade head
          fi

      - name: Deploy backend to Railway
        env:
          RAILWAY_TOKEN:              ${{ secrets.RAILWAY_TOKEN }}
          STRIPE_API_KEY:             ${{ env.STRIPE_API_KEY }}
          STRIPE_WEBHOOK_SECRET:      ${{ env.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PUBLISHABLE_KEY:     ${{ env.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PRICE_ID_PRO:        ${{ env.STRIPE_PRICE_ID_PRO }}
          STRIPE_PRICE_ID_ENTERPRISE: ${{ env.STRIPE_PRICE_ID_ENTERPRISE }}
          DATABASE_URL:               ${{ env.DATABASE_URL }}
          REDIS_URL:                  ${{ env.REDIS_URL }}
          JWT_SECRET_KEY:             ${{ env.JWT_SECRET_KEY }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skipping Railway deploy"
            exit 0
          fi
          npm install -g @railway/cli 2>/dev/null || true
          railway up --service nwu-backend

      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_API_URL:    ${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_URL:    ${{ vars.NEXT_PUBLIC_APP_URL }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — skipping Vercel deploy"
            exit 0
          fi
          npm install -g vercel 2>/dev/null || true
          cd frontend && vercel --prod --token "$VERCEL_TOKEN"

      - name: Health check
        run: |
          URL="${{ vars.NEXT_PUBLIC_API_URL }}"
          if [ -z "$URL" ]; then
            echo "API URL not configured — skipping health check"
            exit 0
          fi
          curl -sf "$URL/health" && echo "Health check passed" || echo "Health check failed (non-fatal)"
