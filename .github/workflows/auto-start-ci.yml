name: Auto-Start CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  auto-configure-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Run auto-configuration
      run: |
        chmod +x auto-configure.sh
        ./auto-configure.sh

    - name: Run pre-flight checks
      run: |
        chmod +x preflight-check.sh
        ./preflight-check.sh || echo "Some checks failed but continuing..."

    - name: Start services
      run: |
        docker-compose up -d
        sleep 30

    - name: Wait for services
      run: |
        timeout 120 bash -c 'until curl -f http://localhost:8000/health; do sleep 5; done' || true

    - name: Check service health
      run: |
        docker-compose ps
        curl -f http://localhost:8000/health || echo "Backend health check failed"

    - name: Run auto-recovery if needed
      if: failure()
      run: |
        chmod +x auto-recovery.sh
        ./auto-recovery.sh

    - name: Show logs on failure
      if: failure()
      run: |
        docker-compose logs backend
        docker-compose logs postgres

    - name: Cleanup
      if: always()
      run: |
        docker-compose down -v
