name: Automated Release

on:
  push:
    branches: [main]
    paths:
      - 'backend/package.json'
      - 'frontend/package.json'
      - 'contracts/package.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
      component:
        description: 'Component to release'
        required: true
        type: choice
        options:
          - all
          - backend
          - frontend
          - contracts

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      full_notes: ${{ steps.full_notes.outputs.notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Generate version
        id: version
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION=$(date +%Y.%m.%d)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Generate compact changelog
        id: changelog
        run: |
          CHANGELOG=$(node scripts/generate-release-notes.js compact)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Generate full release notes
        id: full_notes
        run: |
          NOTES=$(node scripts/generate-release-notes.js generate ${{ steps.version.outputs.version }})
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Update CHANGELOG.md
        run: |
          node scripts/generate-release-notes.js update ${{ steps.version.outputs.version }}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet || git commit -m "docs: Update CHANGELOG.md for v${{ steps.version.outputs.version }}"
          git push || echo "No changes to push"

  backend-release:
    name: Release Backend
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: |
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == 'backend' ||
      hashFiles('backend/**') != ''
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: ${{ hashFiles('backend/package-lock.json') != '' && 'npm' || '' }}
      - name: Install dependencies
        run: cd backend && npm install
      - name: Run tests
        run: cd backend && npm test
      - name: Build
        run: cd backend && npm run build
      - name: Update version
        run: cd backend && npm version ${{ needs.prepare-release.outputs.version }} --no-git-tag-version

      - name: Guard — check NPM_TOKEN
        id: npm-check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN not configured — skipping npm publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.npm-check.outputs.skip != 'true'
        run: cd backend && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/nwu-backend:${{ needs.prepare-release.outputs.version }} \
            -t ${{ env.REGISTRY }}/nwu-backend:latest \
            ./backend
      - name: Push Docker image
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker push ${{ env.REGISTRY }}/nwu-backend:${{ needs.prepare-release.outputs.version }}
          docker push ${{ env.REGISTRY }}/nwu-backend:latest
        continue-on-error: true

  frontend-release:
    name: Release Frontend
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: |
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == 'frontend' ||
      hashFiles('frontend/**') != ''
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: ${{ hashFiles('frontend/package-lock.json') != '' && 'npm' || '' }}
      - name: Install dependencies
        run: cd frontend && npm install
      - name: Run tests
        run: cd frontend && npm test -- --coverage
      - name: Build
        run: cd frontend && npm run build

      - name: Guard — check VERCEL_TOKEN
        id: vercel-check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not configured — skipping Vercel deploy"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        if: steps.vercel-check.outputs.skip != 'true'
        uses: vercel/action@master
        with:
          working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Build Docker image
        run: |
          docker build -t ${{ env.REGISTRY }}/nwu-frontend:${{ needs.prepare-release.outputs.version }} \
            -t ${{ env.REGISTRY }}/nwu-frontend:latest \
            ./frontend
      - name: Push Docker image
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
          docker push ${{ env.REGISTRY }}/nwu-frontend:${{ needs.prepare-release.outputs.version }}
          docker push ${{ env.REGISTRY }}/nwu-frontend:latest
        continue-on-error: true

  contracts-release:
    name: Release Smart Contracts
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: |
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == 'contracts' ||
      hashFiles('contracts/**') != ''
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: ${{ hashFiles('contracts/package-lock.json') != '' && 'npm' || '' }}
      - name: Install dependencies
        run: cd contracts && npm install
      - name: Compile contracts
        run: cd contracts && npm run compile
      - name: Run tests
        run: cd contracts && npm test
      - name: Update version
        run: cd contracts && npm version ${{ needs.prepare-release.outputs.version }} --no-git-tag-version

      - name: Guard — check NPM_TOKEN
        id: npm-check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "NPM_TOKEN not configured — skipping npm publish"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish to npm
        if: steps.npm-check.outputs.skip != 'true'
        run: cd contracts && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        continue-on-error: true

  create-release:
    name: Create GitHub Release
    needs: [prepare-release, backend-release, frontend-release, contracts-release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        uses: softprops/action-gh-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: Release ${{ needs.prepare-release.outputs.version }}
          body: ${{ needs.prepare-release.outputs.full_notes }}
          draft: false
          prerelease: false
          generate_release_notes: false

  notify-release:
    name: Notify Release
    needs: [prepare-release, create-release]
    runs-on: ubuntu-latest
    permissions: {}
    if: always()
    steps:
      - name: Guard — check DISCORD_WEBHOOK
        id: discord-check
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not configured — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Post to Discord
        if: steps.discord-check.outputs.skip != 'true'
        uses: sarisia/actions-status-discord@v1
        with:
          webhook_url: ${{ secrets.DISCORD_WEBHOOK }}
          title: "Release Published"
          description: "Version ${{ needs.prepare-release.outputs.version }} is now available!"
          color: 0x28a745
        continue-on-error: true

      - name: Guard — check SLACK_WEBHOOK
        id: slack-check
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "SLACK_WEBHOOK not configured — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        if: steps.slack-check.outputs.skip != 'true'
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "NWU Protocol v${{ needs.prepare-release.outputs.version }} released!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*NWU Protocol Release*\nVersion: `${{ needs.prepare-release.outputs.version }}`\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ needs.prepare-release.outputs.version }}|View Release>"
                  }
                }
              ]
            }
        continue-on-error: true
