name: Sync Secrets → Railway

on:
  # Run after any push to main that touches secret-relevant config
  push:
    branches: [main]
    paths:
      - '.env.example'
      - 'backend/app/config.py'
      - '.github/workflows/sync-secrets-to-railway.yml'

  # Manual trigger — most common usage
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Railway environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      dry_run:
        description: 'Dry run — print vars without pushing'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read

# Prevent concurrent syncs that could race
concurrency:
  group: sync-secrets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync:
    name: Sync secrets to Railway (${{ inputs.environment || 'production' }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Install Railway CLI ──────────────────────────────────────────────
      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      # ── Authenticate ────────────────────────────────────────────────────
      - name: Authenticate with Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::RAILWAY_TOKEN secret is not set."
            echo "  Add it at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "✓ RAILWAY_TOKEN present (${#RAILWAY_TOKEN} chars)"
          railway whoami

      # ── Build the var list from GitHub secrets ───────────────────────────
      # Each secret is passed as an env var; the step writes them to Railway.
      # Add new secrets here AND to the GitHub repo secrets page.
      - name: Push secrets to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

          # ── Authentication ──────────────────────────────────────────────
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          SECRET_KEY:     ${{ secrets.SECRET_KEY }}

          # ── NSR / UEEP ─────────────────────────────────────────────────
          NSR_OVERRIDE_SECRET: ${{ secrets.NSR_OVERRIDE_SECRET }}

          # ── Database ───────────────────────────────────────────────────
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MONGO_URL:    ${{ secrets.MONGO_URL }}

          # ── Stripe ─────────────────────────────────────────────────────
          STRIPE_SECRET_KEY:       ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_PUBLISHABLE_KEY:  ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_WEBHOOK_SECRET:   ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID_BASIC:        ${{ secrets.STRIPE_PRICE_ID_BASIC }}
          STRIPE_PRICE_ID_PREMIUM:      ${{ secrets.STRIPE_PRICE_ID_PREMIUM }}
          STRIPE_PRICE_ID_ENTERPRISE:   ${{ secrets.STRIPE_PRICE_ID_ENTERPRISE }}

          # ── AI / Research ──────────────────────────────────────────────
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}

          # ── Infrastructure ─────────────────────────────────────────────
          REDIS_URL:    ${{ secrets.REDIS_URL }}
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}

          # ── Blockchain (optional) ──────────────────────────────────────
          ETH_RPC_URL:       ${{ secrets.ETH_RPC_URL }}
          SEPOLIA_RPC_URL:   ${{ secrets.SEPOLIA_RPC_URL }}
          PRIVATE_KEY:       ${{ secrets.PRIVATE_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

        run: |
          set -euo pipefail

          PUSHED=0
          SKIPPED=0

          push_var() {
            local name="$1"
            local value="${!name:-}"
            if [ -z "$value" ]; then
              echo "  ⚠  SKIP (empty): $name"
              ((SKIPPED++)) || true
              return
            fi
            if [ "$DRY_RUN" = "true" ]; then
              echo "  [dry-run] WOULD SET: $name (${#value} chars)"
              ((PUSHED++)) || true
              return
            fi
            if railway variables --set "${name}=${value}" 2>/dev/null; then
              echo "  ✓ SET: $name"
              ((PUSHED++)) || true
            else
              echo "  ✗ FAILED: $name"
            fi
          }

          echo "Pushing secrets to Railway (${{ inputs.environment || 'production' }})…"
          echo

          push_var JWT_SECRET_KEY
          push_var SECRET_KEY
          push_var NSR_OVERRIDE_SECRET
          push_var DATABASE_URL
          push_var MONGO_URL
          push_var REDIS_URL
          push_var RABBITMQ_URL
          push_var STRIPE_SECRET_KEY
          push_var STRIPE_PUBLISHABLE_KEY
          push_var STRIPE_WEBHOOK_SECRET
          push_var STRIPE_PRICE_ID_BASIC
          push_var STRIPE_PRICE_ID_PREMIUM
          push_var STRIPE_PRICE_ID_ENTERPRISE
          push_var PERPLEXITY_API_KEY
          push_var OPENAI_API_KEY
          push_var ETH_RPC_URL
          push_var SEPOLIA_RPC_URL
          push_var PRIVATE_KEY
          push_var ETHERSCAN_API_KEY

          echo
          echo "── Summary ──────────────────────────────────────"
          echo "  Pushed:  $PUSHED"
          echo "  Skipped: $SKIPPED (empty / not configured)"
          if [ "$DRY_RUN" = "true" ]; then
            echo "  Mode:    DRY RUN — no changes made to Railway"
          fi

      # ── Optional: trigger redeploy ───────────────────────────────────────
      - name: Trigger Railway redeploy
        if: ${{ inputs.dry_run != 'true' }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Triggering Railway redeploy…"
          railway up --detach && echo "✓ Redeploy queued" || echo "⚠ Redeploy skipped (push a commit to trigger)"

      - name: Summary
        if: always()
        run: |
          echo "### Secret Sync Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ inputs.environment || 'production' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dry run | ${{ inputs.dry_run || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Triggered by | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
