name: Notify API Key Automaton

on:
  push:
    branches:
      - main
      - staging
      - production
  workflow_dispatch:

permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Guard — check AUTOMATON secrets
        id: secret-check
        env:
          AUTOMATON_URL: ${{ secrets.AUTOMATON_URL }}
          AUTOMATON_ADMIN_KEY: ${{ secrets.AUTOMATON_ADMIN_KEY }}
        run: |
          if [ -z "$AUTOMATON_URL" ]; then
            echo "AUTOMATON_URL not configured — skipping"
            exit 0
          fi
          if [ -z "$AUTOMATON_ADMIN_KEY" ]; then
            echo "AUTOMATON_ADMIN_KEY not configured — skipping"
            exit 0
          fi
          echo "secrets_ok=true" >> $GITHUB_OUTPUT

      - name: Notify Automaton
        if: steps.secret-check.outputs.secrets_ok == 'true'
        env:
          AUTOMATON_URL: ${{ secrets.AUTOMATON_URL }}
          AUTOMATON_ADMIN_KEY: ${{ secrets.AUTOMATON_ADMIN_KEY }}
        run: |
          curl -X POST "$AUTOMATON_URL/api/system-requests" \
            -H "X-Admin-API-Key: $AUTOMATON_ADMIN_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "repo": "${{ github.repository }}",
              "commit_sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}"
            }'
